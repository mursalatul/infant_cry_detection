{% extends "base.html" %}

{% block title %}Page Not Found - Infant Cry Detection{% endblock %}
{% load static %}
{% load tz %}

<!-- custom style start -->
{% block custom_styles %}
<!-- make sure to use a style tag -->
{% endblock %}
<!-- custom style end -->

{% block content %}
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

<div class="container d-flex justify-content-center align-items-center"
    style="height: 100vh; background: var(--light-color);">
    <div class="text-center p-5 rounded shadow" style="background-color: white; max-width: 500px; border-top: 4px solid var(--secondary-color);">
        <!-- Loss-indicating icon -->
        <i class="fas fa-map-marked-alt" style="font-size: 6rem; color: var(--primary-color);"></i>
        <h1 class="display-4 mt-3 fw-bold" style="font-family: var(--font-heading); color: var(--primary-color);">404</h1>
        <p class="lead text-muted">You seem to have taken a wrong turn...</p>
        <p class="lead text-muted">Page not found 😓</p>
        <a href="/" class="btn mt-3 px-4 py-2 text-white" style="background-color: var(--primary-color); border-radius: 50px;">Take Me Home</a>
    </div>
</div>

<style>
    @keyframes fadeIn {
        0% {
            opacity: 0;
            transform: translateY(20px);
        }

        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .container .text-center {
        animation: fadeIn 1s ease-out;
    }
</style>
{% endblock %}
